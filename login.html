<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - Dr.直し屋ラーニング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-hero {
      background: linear-gradient(135deg, var(--primary) 0%, #6366F1 100%);
      color: var(--white);
      padding: 32px 24px 28px;
      text-align: center;
    }
    .login-hero-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .login-hero h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .login-hero p {
      font-size: 13px;
      opacity: 0.85;
    }
    .auth-tabs {
      display: flex;
      background: var(--white);
      border-bottom: 2px solid var(--gray-100);
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-400);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
      font-family: inherit;
    }
    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .auth-form {
      padding: 24px 20px;
    }
    .auth-panel {
      display: none;
    }
    .auth-panel.active {
      display: block;
    }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 13px;
      color: var(--primary);
      margin-bottom: 20px;
      margin-top: -8px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      border: 2px solid var(--gray-200);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .google-btn:hover {
      background: var(--gray-50);
      border-color: var(--gray-300);
    }
    .google-icon {
      width: 20px;
      height: 20px;
    }
    .terms-text {
      font-size: 11px;
      color: var(--text-light);
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }
    .terms-text a {
      color: var(--primary);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="app-body" style="padding-bottom: 0;">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <a href="index.html" class="header-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </a>
          <h1>ログイン</h1>
        </div>
      </div>

      <!-- Login Hero -->
      <div class="login-hero">
        <div class="login-hero-icon">&#x1F3E0;</div>
        <h2>Dr.直し屋ラーニング</h2>
        <p>プロの技術を、あなたの手に。</p>
      </div>

      <!-- Auth Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">ログイン</button>
        <button class="auth-tab" onclick="switchTab('register')">新規登録</button>
      </div>

      <!-- Login Panel -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-form">
          <div class="input-group">
            <label for="login-email">メールアドレス</label>
            <input type="email" id="login-email" class="input-field" placeholder="example@mail.com">
          </div>
          <div class="input-group">
            <label for="login-password">パスワード</label>
            <input type="password" id="login-password" class="input-field" placeholder="パスワードを入力">
          </div>
          <a href="#" class="forgot-link">パスワードをお忘れの方</a>
          <a href="home.html" class="btn btn-primary mb-16">ログイン</a>

          <div class="divider-text"><span>または</span></div>

          <button class="google-btn" onclick="location.href='home.html'">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Googleでログイン
          </button>
        </div>
      </div>

      <!-- Register Panel -->
      <div class="auth-panel" id="panel-register">
        <div class="auth-form">
          <div class="input-group">
            <label for="reg-name">お名前</label>
            <input type="text" id="reg-name" class="input-field" placeholder="山田 太郎">
          </div>
          <div class="input-group">
            <label for="reg-email">メールアドレス</label>
            <input type="email" id="reg-email" class="input-field" placeholder="example@mail.com">
          </div>
          <div class="input-group">
            <label for="reg-password">パスワード</label>
            <input type="password" id="reg-password" class="input-field" placeholder="8文字以上で入力">
          </div>
          <div class="input-group">
            <label for="reg-password-confirm">パスワード（確認）</label>
            <input type="password" id="reg-password-confirm" class="input-field" placeholder="もう一度入力してください">
          </div>
          <a href="home.html" class="btn btn-primary mb-16">新規登録</a>

          <div class="divider-text"><span>または</span></div>

          <button class="google-btn" onclick="location.href='home.html'">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Googleで新規登録
          </button>

          <div class="terms-text">
            登録することで、<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなされます。
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      // Update tab buttons
      document.querySelectorAll('.auth-tab').forEach(function(el) {
        el.classList.remove('active');
      });
      // Update panels
      document.querySelectorAll('.auth-panel').forEach(function(el) {
        el.classList.remove('active');
      });

      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('panel-login').classList.add('active');
        document.querySelector('.header h1').textContent = 'ログイン';
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('panel-register').classList.add('active');
        document.querySelector('.header h1').textContent = '新規登録';
      }
    }
  </script>
</body>
</html>
