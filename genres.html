<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ジャンル一覧 - Dr.直し屋ラーニング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .genre-subtitle {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 16px;
    }
    .genre-card-link {
      display: block;
      cursor: pointer;
    }
    .genre-card-link:active .genre-card {
      transform: scale(0.98);
    }
    .genre-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .genre-emoji {
      font-size: 28px;
      flex-shrink: 0;
    }
    .genre-info {
      flex: 1;
      min-width: 0;
    }
    .genre-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
    }
    .genre-desc {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 2px;
    }
    .genre-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 10px;
    }
    .genre-stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .genre-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .genre-progress-bar {
      flex: 1;
      height: 6px;
      background: var(--gray-100);
      border-radius: 3px;
      overflow: hidden;
    }
    .genre-progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s;
    }
    .genre-progress-fill.c1 { background: #0EA5E9; }
    .genre-progress-fill.c2 { background: #2ED573; }
    .genre-progress-fill.c3 { background: #FF6B6B; }
    .genre-progress-fill.c4 { background: #F59E0B; }
    .genre-progress-fill.c5 { background: #8B5CF6; }
    .genre-progress-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-600);
      flex-shrink: 0;
      width: 44px;
      text-align: right;
    }
    .bottom-actions {
      display: flex;
      gap: 10px;
    }
    .bottom-actions .btn {
      flex: 1;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="app-body">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>ジャンル一覧</h1>
      </div>
    </header>

    <!-- Content -->
    <div class="section">
      <div class="genre-subtitle">学びたいジャンルを選択してください</div>

      <!-- Genre 1: 内装 -->
      <a href="quiz-list.html" class="genre-card-link">
        <div class="card genre-card c1 card-tap card-hover">
          <div class="genre-card-header">
            <div class="genre-emoji"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0EA5E9" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
            <div class="genre-info">
              <div class="genre-name">内装</div>
              <div class="genre-desc">壁紙・床材・建具の知識</div>
            </div>
          </div>
          <div class="genre-stats">
            <div class="genre-stat-item">
              <span>Q.</span><span>問題42問</span>
            </div>
            <div class="genre-stat-item">
              <span>▶</span><span>動画12本</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Genre 2: 塗装 -->
      <a href="quiz-list.html" class="genre-card-link">
        <div class="card genre-card c2 card-tap card-hover">
          <div class="genre-card-header">
            <div class="genre-emoji"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2ED573" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/><circle cx="12" cy="19" r="2"/></svg></div>
            <div class="genre-info">
              <div class="genre-name">塗装</div>
              <div class="genre-desc">塗料・下地・塗装技法</div>
            </div>
          </div>
          <div class="genre-stats">
            <div class="genre-stat-item">
              <span>Q.</span><span>問題38問</span>
            </div>
            <div class="genre-stat-item">
              <span>▶</span><span>動画10本</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Genre 3: 建材知識 -->
      <a href="quiz-list.html" class="genre-card-link">
        <div class="card genre-card c3 card-tap card-hover">
          <div class="genre-card-header">
            <div class="genre-emoji"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B6B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="6" x2="12" y2="18"/></svg></div>
            <div class="genre-info">
              <div class="genre-name">建材知識</div>
              <div class="genre-desc">木材・金属・各種素材</div>
            </div>
          </div>
          <div class="genre-stats">
            <div class="genre-stat-item">
              <span>Q.</span><span>問題50問</span>
            </div>
            <div class="genre-stat-item">
              <span>▶</span><span>動画15本</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Genre 4: 道具 -->
      <a href="quiz-list.html" class="genre-card-link">
        <div class="card genre-card c4 card-tap card-hover">
          <div class="genre-card-header">
            <div class="genre-emoji"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div>
            <div class="genre-info">
              <div class="genre-name">道具</div>
              <div class="genre-desc">工具・測定器・安全装備</div>
            </div>
          </div>
          <div class="genre-stats">
            <div class="genre-stat-item">
              <span>Q.</span><span>問題35問</span>
            </div>
            <div class="genre-stat-item">
              <span>▶</span><span>動画8本</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Genre 5: 施工基礎 -->
      <a href="quiz-list.html" class="genre-card-link">
        <div class="card genre-card c5 card-tap card-hover">
          <div class="genre-card-header">
            <div class="genre-emoji"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="12" width="6" height="10" rx="1"/><rect x="9" y="8" width="6" height="14" rx="1"/><rect x="16" y="4" width="6" height="18" rx="1"/></svg></div>
            <div class="genre-info">
              <div class="genre-name">施工基礎</div>
              <div class="genre-desc">施工手順・安全管理・図面</div>
            </div>
          </div>
          <div class="genre-stats">
            <div class="genre-stat-item">
              <span>Q.</span><span>問題45問</span>
            </div>
            <div class="genre-stat-item">
              <span>▶</span><span>動画11本</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Bottom Action Buttons -->
      <div class="bottom-actions mt-20">
        <a href="videos.html" class="btn btn-outline btn-sm">▶ 動画一覧を見る</a>
        <a href="quiz-list.html" class="btn btn-outline btn-sm">Q. クイズ一覧を見る</a>
      </div>

    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>ホーム</span></a>
    <a href="genres.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>ジャンル</span></a>
    <a href="favorites.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>お気に入り</span></a>
    <a href="mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>マイページ</span></a>
  </nav>
</div>
</body>
</html>
