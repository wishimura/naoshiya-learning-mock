<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ - Dr.直し屋ラーニング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-section {
      text-align: center;
      padding: 28px 20px 20px;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      margin: 0 auto 12px;
    }
    .profile-name {
      font-size: 20px;
      font-weight: 800;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    .profile-email {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .profile-plan {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
    }
    .streak-card {
      background: linear-gradient(135deg, #0EA5E9, #38BDF8);
      color: var(--white);
      border-radius: var(--radius);
      padding: 24px 20px;
      margin-bottom: 12px;
    }
    .streak-emoji {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .streak-num {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }
    .streak-sub {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
    }
    .contract-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius);
      padding: 20px;
    }
    .contract-plan-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 4px;
    }
    .contract-plan-desc {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="app-body">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>マイページ</h1>
      </div>
    </header>

    <!-- Profile Section -->
    <div class="profile-section">
      <div class="profile-avatar">山</div>
      <div class="profile-name">山田 太郎</div>
      <div class="profile-email">yamada@example.com</div>
      <div class="profile-plan">無料会員</div>
    </div>

    <!-- Streak Card -->
    <div class="section" style="padding-top: 0; padding-bottom: 0;">
      <div class="streak-card anim-fade">
        <div class="streak-emoji">&#x1F525;</div>
        <div class="streak-num">7日連続学習中</div>
        <div class="streak-sub">最長記録: 14日</div>
      </div>
    </div>

    <!-- Stat Grid -->
    <div class="section" style="padding-top: 12px;">
      <div class="grid-3">
        <div class="stat-card">
          <div class="stat-num">48</div>
          <div class="stat-label">解いた問題</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">12</div>
          <div class="stat-label">視聴した動画</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">7</div>
          <div class="stat-label">連続日数</div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" style="margin: 0 20px;"></div>

    <!-- Contract Status -->
    <div class="section">
      <div class="section-title">契約状況</div>
      <div class="contract-card">
        <div class="contract-plan-name">無料プラン</div>
        <div class="contract-plan-desc">基本コンテンツのみ利用可能</div>
        <a href="pricing.html" class="btn btn-primary btn-sm">プラン変更</a>
      </div>
    </div>

    <!-- Divider -->
    <div class="divider" style="margin: 0 20px;"></div>

    <!-- Logout -->
    <div class="section">
      <a href="index.html" class="btn btn-danger-outline">ログアウト</a>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>ホーム</span></a>
    <a href="genres.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>ジャンル</span></a>
    <a href="favorites.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>お気に入り</span></a>
    <a href="mypage.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>マイページ</span></a>
  </nav>
</div>
</body>
</html>
