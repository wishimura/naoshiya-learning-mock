<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - Dr.直し屋ラーニング</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .admin-header {
      background: #1E293B;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-header h1 {
      font-size: 17px;
      font-weight: 700;
    }
    .admin-subtitle {
      text-align: center;
      padding: 20px 20px 8px;
      font-size: 13px;
      color: var(--text-light);
      font-weight: 600;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 16px 12px;
      text-align: center;
      border: 1px solid var(--gray-100);
      box-shadow: var(--shadow);
    }
    .stat-card .stat-num {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }
    .stat-border-primary { border-left: 4px solid var(--primary); }
    .stat-border-info { border-left: 4px solid #3B82F6; }
    .stat-border-accent { border-left: 4px solid var(--accent); }
    .stat-border-success { border-left: 4px solid var(--success); }
    .menu-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .menu-card:active {
      transform: scale(0.98);
    }
    .menu-card:hover {
      box-shadow: var(--shadow-md);
    }
    .menu-card-body {
      flex: 1;
    }
    .menu-card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .menu-card-desc {
      font-size: 12px;
      color: var(--text-light);
    }
    .menu-card-arrow {
      font-size: 16px;
      color: var(--gray-400);
      flex-shrink: 0;
    }
    .footer-link {
      text-align: center;
      padding: 24px 20px 32px;
    }
    .footer-link a {
      font-size: 14px;
      color: var(--primary);
      font-weight: 600;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="app-body" style="padding-bottom: 0;">

    <!-- Header -->
    <div class="admin-header">
      <h1>管理画面</h1>
      <div class="header-icon" style="background: rgba(255,255,255,0.15); color: white;">👤</div>
    </div>

    <!-- Subtitle -->
    <div class="admin-subtitle">Dr.直し屋ラーニング 管理システム</div>

    <!-- Stats Grid -->
    <div class="section" style="padding-top: 12px;">
      <div class="grid-2">
        <div class="stat-card stat-border-primary">
          <div class="stat-num" style="color: var(--primary);">210</div>
          <div class="stat-label">登録問題数</div>
        </div>
        <div class="stat-card stat-border-info">
          <div class="stat-num" style="color: #3B82F6;">56</div>
          <div class="stat-label">登録動画数</div>
        </div>
        <div class="stat-card stat-border-accent">
          <div class="stat-num" style="color: var(--accent);">1,248</div>
          <div class="stat-label">登録ユーザー</div>
        </div>
        <div class="stat-card stat-border-success">
          <div class="stat-num" style="color: var(--success);">342</div>
          <div class="stat-label">有料会員数</div>
        </div>
      </div>
    </div>

    <!-- Menu Section -->
    <div class="section" style="padding-top: 8px;">
      <div class="section-title">メニュー</div>

      <a href="questions.html">
        <div class="menu-card">
          <div class="feat-icon" style="background: var(--primary-pale); color: var(--primary);">🧩</div>
          <div class="menu-card-body">
            <div class="menu-card-title">問題管理</div>
            <div class="menu-card-desc">クイズ問題の追加・編集・削除</div>
          </div>
          <div class="menu-card-arrow">→</div>
        </div>
      </a>

      <a href="#">
        <div class="menu-card">
          <div class="feat-icon" style="background: #FEE2E2; color: #EF4444;">🎬</div>
          <div class="menu-card-body">
            <div class="menu-card-title">動画管理</div>
            <div class="menu-card-desc">動画コンテンツの追加・編集</div>
          </div>
          <div class="menu-card-arrow">→</div>
        </div>
      </a>

      <a href="#">
        <div class="menu-card">
          <div class="feat-icon" style="background: #DCFCE7; color: #22C55E;">👥</div>
          <div class="menu-card-body">
            <div class="menu-card-title">ユーザー管理</div>
            <div class="menu-card-desc">会員情報の確認・管理</div>
          </div>
          <div class="menu-card-arrow">→</div>
        </div>
      </a>

      <a href="csv.html">
        <div class="menu-card">
          <div class="feat-icon" style="background: #FEF3C7; color: #D97706;">📥</div>
          <div class="menu-card-body">
            <div class="menu-card-title">CSVインポート</div>
            <div class="menu-card-desc">問題の一括登録</div>
          </div>
          <div class="menu-card-arrow">→</div>
        </div>
      </a>

      <a href="#">
        <div class="menu-card">
          <div class="feat-icon" style="background: #EDE9FE; color: #7C3AED;">📊</div>
          <div class="menu-card-body">
            <div class="menu-card-title">学習データ確認</div>
            <div class="menu-card-desc">ユーザーの学習状況分析</div>
          </div>
          <div class="menu-card-arrow">→</div>
        </div>
      </a>
    </div>

    <!-- Footer Link -->
    <div class="footer-link">
      <a href="../home.html">← ユーザー画面に戻る</a>
    </div>

  </div>
</div>
</body>
</html>
