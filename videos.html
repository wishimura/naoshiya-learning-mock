<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画講座 - Dr.直し屋ラーニング</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .video-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 0 20px 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .video-card:active {
      transform: scale(0.98);
    }
    .video-card:hover {
      box-shadow: var(--shadow-md);
    }
    .video-thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .video-thumbnail.bg-green {
      background: linear-gradient(135deg, #86EFAC, #2ED573);
    }
    .video-thumbnail.bg-blue {
      background: linear-gradient(135deg, #7DD3FC, #0EA5E9);
    }
    .video-thumbnail.bg-red {
      background: linear-gradient(135deg, #FCA5A5, #FF6B6B);
    }
    .video-thumbnail.bg-gray {
      background: linear-gradient(135deg, #CBD5E1, #94A3B8);
    }
    .video-play-btn {
      width: 56px;
      height: 56px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--gray-700);
    }
    .video-thumbnail.bg-green .video-play-btn {
      color: #166534;
    }
    .video-thumbnail.bg-blue .video-play-btn {
      color: #1E40AF;
    }
    .video-thumbnail.bg-red .video-play-btn {
      color: #991B1B;
    }
    .video-thumbnail.bg-gray .video-play-btn {
      color: var(--gray-600);
    }
    .video-duration {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .video-viewed-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.65);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .video-card-body {
      padding: 14px 16px;
    }
    .video-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .video-card-info {
      flex: 1;
      min-width: 0;
    }
    .video-card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .video-card-meta {
      font-size: 12px;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .video-card-fav {
      flex-shrink: 0;
      padding-top: 2px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="app-body">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <a href="genres.html" class="header-back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h1>動画講座</h1>
      </div>
    </header>

    <!-- Tab Bar -->
    <div class="tabs">
      <div class="tab-item active">すべて</div>
      <div class="tab-item">内装</div>
      <div class="tab-item">塗装</div>
      <div class="tab-item">建材</div>
    </div>

    <!-- Video List -->
    <div style="padding-top: 16px;">

      <!-- Video 1: Viewed + Fav On -->
      <a href="video.html" class="video-card">
        <div class="video-thumbnail bg-green">
          <div class="video-play-btn">▶</div>
          <div class="video-viewed-badge">✅ 視聴済み</div>
          <div class="video-duration">12:30</div>
        </div>
        <div class="video-card-body">
          <div class="video-card-top">
            <div class="video-card-info">
              <div class="video-card-title">壁紙の貼り方 基礎講座</div>
              <div class="video-card-meta">
                <span>内装・初級</span>
                <span class="tag tag-free">無料</span>
              </div>
            </div>
            <div class="video-card-fav">
              <span class="fav on">♥</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Video 2 -->
      <a href="video.html" class="video-card">
        <div class="video-thumbnail bg-blue">
          <div class="video-play-btn">▶</div>
          <div class="video-duration">18:45</div>
        </div>
        <div class="video-card-body">
          <div class="video-card-top">
            <div class="video-card-info">
              <div class="video-card-title">パテ処理の基本テクニック</div>
              <div class="video-card-meta">
                <span>塗装・中級</span>
                <span class="tag tag-free">無料</span>
              </div>
            </div>
            <div class="video-card-fav">
              <span class="fav">♡</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Video 3: Premium -->
      <a href="video.html" class="video-card">
        <div class="video-thumbnail bg-red">
          <div class="video-play-btn">▶</div>
          <div class="video-duration">25:10</div>
        </div>
        <div class="video-card-body">
          <div class="video-card-top">
            <div class="video-card-info">
              <div class="video-card-title">フローリング補修 プロの技</div>
              <div class="video-card-meta">
                <span>建材知識・上級</span>
                <span class="tag tag-premium">有料</span>
              </div>
            </div>
            <div class="video-card-fav">
              <span class="fav">♡</span>
            </div>
          </div>
        </div>
      </a>

      <!-- Video 4: Locked -->
      <a href="video.html" class="video-card">
        <div class="video-thumbnail bg-gray">
          <div class="video-play-btn">▶</div>
          <div class="lock-overlay">🔒</div>
        </div>
        <div class="video-card-body">
          <div class="video-card-top">
            <div class="video-card-info">
              <div class="video-card-title">塗装の色合わせテクニック</div>
              <div class="video-card-meta">
                <span>塗装・上級</span>
                <span class="tag tag-premium">有料</span>
              </div>
            </div>
            <div class="video-card-fav">
              <span class="fav">♡</span>
            </div>
          </div>
        </div>
      </a>

    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="home.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>ホーム</span></a>
    <a href="genres.html" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>ジャンル</span></a>
    <a href="favorites.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>お気に入り</span></a>
    <a href="mypage.html" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>マイページ</span></a>
  </nav>
</div>
</body>
</html>
